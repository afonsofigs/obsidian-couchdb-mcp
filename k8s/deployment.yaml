apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-mcp
  namespace: obsidian-ns
  labels:
    app: obsidian-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian-mcp
  template:
    metadata:
      labels:
        app: obsidian-mcp
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: obsidian-mcp
          image: ghcr.io/afonsofigs/obsidian-couchdb-mcp:latest
          ports:
            - containerPort: 3000
          env:
            - name: COUCHDB_URL
              value: "http://couchdb.obsidian-ns.svc.cluster.local:5984"
            - name: COUCHDB_DATABASE
              value: "obsidian_vault"
            - name: COUCHDB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: obsidian-mcp-secrets
                  key: COUCHDB_USERNAME
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obsidian-mcp-secrets
                  key: COUCHDB_PASSWORD
            - name: MCP_SECRET
              valueFrom:
                secretKeyRef:
                  name: obsidian-mcp-secrets
                  key: MCP_SECRET
            - name: SERVER_URL
              value: "https://obsidian-mcp.example.com"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian-mcp
  namespace: obsidian-ns
  labels:
    app: obsidian-mcp
spec:
  selector:
    app: obsidian-mcp
  ports:
    - port: 80
      targetPort: 3000
